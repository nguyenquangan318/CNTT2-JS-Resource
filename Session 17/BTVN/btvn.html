<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list">
    </ul>
    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên san phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit" onclick="handleAddProduct(event)">Thêm Sản Phẩm</button>
    </form>
    <script>
        let products = [
            { id: 1, name: "Bánh Chưng", price: 150000 },
            { id: 2, name: "Giò Lụa", price: 180000 },
            // { id: 3, name: "Canh Đào", price: 500000 },
            // { id: 4, name: "Mứt Tet", price: 120000 },
            // { id: 5, name: "Bao Lì Xì", price: 25000 },
            // { id: 6, name: "Dưa Hấu Tết", price: 80000 },
        ];

        function renderProducts() {
            let productsListElement = document.getElementById("product-list");
            productsListElement.innerHTML = "";
            products.forEach((product) => {
                productsListElement.innerHTML += `<li>
            <div class="product">
                <p>Tên sản phẩm: ${product.name}</p>
                <p>Giá sản phẩm: ${product.price}</p>
                <button onclick = "handleDeleteProduct(${product.id})">Xóa</button>
            </div>
        </li>`;
            })
        }

        function handleAddProduct(event) {
            event.preventDefault();
            let nameInputElement = document.getElementById("product-name");
            let priceInputElement = document.getElementById("product-price");
            let newProductName = nameInputElement.value;
            let newProductPrice = +priceInputElement.value;
            let newProduct = {
                id: products.length !== 0 ? products[products.length - 1].id + 1 : 1,
                name: newProductName,
                price: newProductPrice
            };
            products.push(newProduct);
            renderProducts();
        }
        function handleDeleteProduct(id) {
            products = products.filter((product) => product.id !== id);
            renderProducts();
        }

        renderProducts();
    </script>
</body>

</html>
