<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .form {
            display: flex;
            flex-direction: column;
            margin: 20px;
            width: 300px;
            text-align: center;
        }

        .submit-btn {
            width: 30%;
            margin-left: 30%;
        }

        .input-group {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .bg-blue {
            background-color: blue;
        }
    </style>
</head>

<body>
    <!-- <h1 onclick="handleClick()">Demo events</h1> -->
    <h1>Demo events</h1>
    <form action="" class="form" id="form">
        <div class="input-group">
            <label for="name">Họ và tên</label>
            <input type="text" name="" id="name">
        </div>
        <div class="input-group">
            <label for="age">Tuổi</label>
            <input type="number" id="age">
        </div>
        <input type="submit" class="submit-btn">
    </form>

    <script>
        function handleClick() {
            const form = document.getElementById("form");
            form.classList.toggle("bg-blue");
        }

        const h1 = document.getElementsByTagName("h1")[0];

        // h1.onclick = handleClick;

        h1.addEventListener("click", () => {
            console.log("Sự kiện được gắn bằng addEventListeners");
        });

        const nameInput = document.getElementById("name");
        nameInput.addEventListener("input", () => {
            console.log("Giá trị trong ô input bị thay đổi");
            console.log("Giá trị mới là:", nameInput.value);
        })

        const form = document.getElementById("form");
        form.addEventListener("submit", (e)=>{
            e.preventDefault();
            console.log(e.target);
        })
    </script>
</body>

</html>
